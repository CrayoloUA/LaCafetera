<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Cafetera - Comandas</title>
    <style>
        /* ── PEDIDO META ── */
.pedido-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 6px;
}

.pedido-mesa {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── BADGES DE ESTADO ── */
.pedido-estado-badge {
  display: inline-block;
  padding: 5px 12px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.estado-pendiente-badge { background: #fff0f0; color: #cc0000; border: 1px solid #cc0000; }
.estado-entregado-badge { background: #f0f6ff; color: #0275d8; border: 1px solid #0275d8; }
.estado-pagado-badge    { background: #f0fff4; color: #1a7a3c; border: 1px solid #1a7a3c; }

/* ── BORDE IZQUIERDO POR ESTADO ── */
.estado-pendiente { border-left-color: #cc0000 !important; }
.estado-entregado { border-left-color: #0275d8 !important; }
.estado-pagado    { border-left-color: #1a7a3c !important; opacity: 0.65; }

/* ── TIEMPO Y PROPINA ── */
.pedido-tiempo {
  font-size: 11px;
  color: var(--gray-500);
  letter-spacing: 0.05em;
  margin: 6px 0;
  padding: 6px 10px;
  background: var(--gray-100);
  border-left: 2px solid var(--gray-300);
}

.pedido-propina {
  font-size: 11px;
  font-weight: 600;
  color: #9a6500;
  letter-spacing: 0.05em;
  margin: 6px 0;
  padding: 6px 10px;
  background: #fffbf0;
  border-left: 2px solid #9a6500;
}

  /* ── VARIABLES ── */
:root {
  --black: #111111;
  --white: #ffffff;
  --gray-100: #f5f5f5;
  --gray-200: #e8e8e8;
  --gray-300: #cccccc;
  --gray-500: #888888;
  --gray-700: #444444;
  --danger: #cc0000;
  --success: #1a7a3c;
  --warning: #9a6500;
  --info: #0066aa;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --t: 0.18s ease;
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--white);
  color: var(--black);
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

body { padding: 16px; overflow-x: hidden; }

/* ── LAYOUT ── */
.container { max-width: 960px; margin: 0 auto; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 36px 20px 28px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--black);
  background: var(--white);
  border-radius: 0;
  box-shadow: none;
}

.header h1 {
  font-size: clamp(20px, 5vw, 32px);
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--black);
  text-shadow: none;
}

.subtitulo {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-top: 6px;
  opacity: 1;
}

/* ── SECCIONES ── */
.seccion {
  background: var(--white);
  padding: 24px 0;
  margin: 0;
  border-bottom: 1px solid var(--gray-200);
  border-radius: 0;
  box-shadow: none;
  border-top: none;
}

.seccion:hover { box-shadow: none; }

.seccion h2 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 18px;
}

/* ── MESAS ── */
.mesa-boton {
  padding: 12px 8px;
  border: 1px solid var(--gray-300);
  border-radius: 0;
  background: var(--white);
  cursor: pointer;
  text-align: center;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  transition: all var(--t);
  color: var(--black);
}

.mesa-boton.libre { border-color: var(--gray-300); }
.mesa-boton.libre:hover {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}

.mesa-boton.ocupada {
  background: var(--gray-100);
  color: var(--gray-300);
  border-color: var(--gray-200);
  cursor: not-allowed;
  text-decoration: line-through;
}

.mesa-boton.seleccionada {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}

/* ── CATEGORÍAS ── */
.categorias {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--gray-200);
}

button.categoria {
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gray-500);
  transition: all var(--t);
  white-space: nowrap;
  flex: none;
  min-width: unset;
}

button.categoria:hover { color: var(--black); }

button.categoria.activa {
  color: var(--black);
  border-bottom: 2px solid var(--black);
}

/* ── ARTÍCULOS ── */
.articulos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(90px, 18vw, 120px), 1fr));
  gap: 1px;
  background: var(--gray-200);
  border: 1px solid var(--gray-200);
  margin-bottom: 20px;
}

button.articulo {
  padding: 14px 10px;
  background: var(--white);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  text-align: center;
  transition: background var(--t);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  min-height: 85px;
  font-weight: 400;
  color: var(--black);
  border-radius: 0;
  box-shadow: none;
}

button.articulo:hover { background: var(--gray-100); }
button.articulo:active { background: var(--gray-200); transform: none; }
button.articulo.seleccionado { background: var(--black); color: var(--white); }

.nombre {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  word-break: break-word;
  margin-bottom: 0;
}

.precio {
  display: block;
  font-weight: 600;
  padding-top: 8px;
  margin-top: 6px;
  border-top: 1px solid var(--gray-200);
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--black);
}

button.articulo.seleccionado .precio {
  color: var(--white);
  border-top-color: rgba(255,255,255,0.2);
}

/* ── CONTROL CANTIDAD ── */
.cantidad-control {
  display: flex;
  gap: 0;
  align-items: center;
  margin: 20px 0;
  justify-content: center;
  flex-wrap: wrap;
  background: var(--gray-100);
  padding: 14px 16px;
  border-radius: 0;
}

.cantidad-control label {
  font-weight: 600;
  color: var(--black);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-right: 12px;
}

.cantidad-control button {
  padding: 8px 14px;
  background: var(--black);
  color: var(--white);
  border: none;
  cursor: pointer;
  font-size: 16px;
  font-weight: 300;
  transition: background var(--t);
  box-shadow: none;
  border-radius: 0;
}

.cantidad-control button:hover { background: var(--gray-700); }
.cantidad-control button:active { background: var(--gray-500); transform: none; }

.cantidad-control input {
  width: 60px;
  padding: 8px;
  text-align: center;
  font-size: 14px;
  font-family: var(--font);
  border: none;
  border-top: 1px solid var(--gray-300);
  border-bottom: 1px solid var(--gray-300);
  font-weight: 600;
  color: var(--black);
  background: var(--white);
  border-radius: 0;
}

/* ── BOTÓN AGREGAR ── */
button.agregar {
  width: 100%;
  padding: 14px;
  background: var(--black);
  color: var(--white);
  border: none;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 12px;
  transition: background var(--t);
  border-radius: 0;
  box-shadow: none;
}

button.agregar:hover { background: var(--gray-700); }
button.agregar:active { background: var(--gray-500); transform: none; }

/* ── RESUMEN PEDIDO ── */
.resumen-pedido {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-top: 2px solid var(--black);
  border-radius: 0;
}

.resumen-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  font-size: 12px;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: transparent;
  border-radius: 0;
  margin-bottom: 0;
  transition: background var(--t);
}

.resumen-item:hover { background: var(--white); }
.resumen-item span:first-child { flex: 1; font-weight: 400; }
.resumen-item span:last-child { display: flex; gap: 8px; align-items: center; }

button.quitar {
  padding: 4px 10px;
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  transition: all var(--t);
  border-radius: 0;
  white-space: nowrap;
}

button.quitar:hover { background: var(--danger); color: var(--white); }

.total {
  font-weight: 600;
  font-size: 14px;
  padding: 16px;
  border-top: 1px solid var(--black);
  color: var(--black);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  background: transparent;
  border-radius: 0;
  margin: 0;
  letter-spacing: 0.05em;
}

/* ── BOTONES PEDIDO ── */
.botones-pedido {
  display: flex;
  gap: 1px;
  margin-top: 12px;
  flex-direction: row;
}

button.enviar, button.cancelar {
  flex: 1;
  padding: 14px;
  color: var(--white);
  border: none;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background var(--t);
  border-radius: 0;
  box-shadow: none;
}

button.enviar { background: var(--black); }
button.enviar:hover { background: var(--gray-700); }
button.cancelar { background: var(--gray-500); }
button.cancelar:hover { background: var(--gray-700); }
button.enviar:active, button.cancelar:active { transform: none; }

/* ── HISTORIAL DE PEDIDOS ── */
.lista-pedidos {
  background: var(--white);
  padding: 28px 0;
  border-radius: 0;
  margin-top: 0;
  box-shadow: none;
  border-top: 2px solid var(--black);
}

.lista-pedidos h2 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 20px;
}

.pedido-item {
  background: var(--white);
  padding: 16px;
  margin: 0 0 1px 0;
  border-left: none;
  border-radius: 0;
  font-size: 12px;
  transition: background var(--t);
  box-shadow: none;
  border: 1px solid var(--gray-200);
  border-left: 3px solid var(--black);
  position: relative;
}

.pedido-item:hover { background: var(--gray-100); transform: none; box-shadow: none; }
.pedido-item.completado { opacity: 0.5; background: var(--gray-100); }

.pedido-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
  gap: 10px;
  flex-wrap: wrap;
}

.pedido-hora {
  font-weight: 600;
  font-size: 11px;
  color: var(--black);
  letter-spacing: 0.05em;
  background: transparent;
  padding: 0;
  border-radius: 0;
}

.pedido-items { color: var(--gray-700); margin: 8px 0; line-height: 1.8; font-weight: 400; }

.pedido-total {
  font-weight: 600;
  font-size: 13px;
  margin: 8px 0;
  color: var(--black);
  background: transparent;
  padding: 0;
  display: inline-block;
  letter-spacing: 0.03em;
}

.pedido-botones { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }

button.completar, button.eliminar, button.editar {
  padding: 6px 12px;
  color: var(--white);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: opacity var(--t);
  white-space: nowrap;
  border-radius: 0;
  box-shadow: none;
}

button.completar { background: var(--info); }
button.eliminar { background: var(--danger); }
button.editar { background: var(--black); color: var(--white); }
button.completar:hover, button.eliminar:hover, button.editar:hover { opacity: 0.75; transform: none; box-shadow: none; }

.completado .pedido-hora { text-decoration: line-through; }

.sin-pedidos {
  color: var(--gray-500);
  text-align: center;
  padding: 40px;
  font-size: 12px;
  letter-spacing: 0.1em;
}

/* ── FILTROS ── */
.filtros-fecha {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filtro-btn {
  padding: 8px 14px;
  background: var(--white);
  border: 1px solid var(--gray-300);
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: all var(--t);
  color: var(--gray-700);
  border-radius: 0;
}

.filtro-btn:hover { background: var(--gray-100); border-color: var(--black); color: var(--black); }
.filtro-btn.activo { background: var(--black); color: var(--white); border-color: var(--black); }

/* ── MODALES ── */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.4);
  animation: fadeIn 0.2s ease;
  overflow-y: auto;
  padding-top: 20px;
}
/* Variantes siempre encima del modal de editar */
#modalVariantes {
  z-index: 1100;
  background-color: rgba(0, 0, 0, 0.2);
}


@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: var(--white);
  margin: 20px auto;
  padding: 28px;
  border-radius: 0;
  width: 95%;
  max-width: 780px;        /* antes 500px */
  box-shadow: 0 4px 32px rgba(0,0,0,0.15);
  animation: slideDown 0.2s ease;
}


@keyframes slideDown {
  from { transform: translateY(-30px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--black);
  padding-bottom: 12px;
}

.modal-header h3 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--black);
}

.close-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--gray-500);
  transition: color var(--t);
  line-height: 1;
}
.close-btn:hover { color: var(--black); }

/* ── MODAL EDITAR ── */
.articulos-actuales {
  background: var(--gray-100);
  padding: 12px;
  margin-bottom: 16px;
  max-height: 150px;
  overflow-y: auto;
}

.articulos-actuales h4 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 10px;
}

.item-actual {
  background: var(--white);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 2px solid var(--black);
  font-size: 12px;
}

.articulos-editar {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 1px;
  background: var(--gray-200);
  border: 1px solid var(--gray-200);
  margin: 14px 0;
  max-height: 250px;
  overflow-y: auto;
}

button.articulo-editar {
  padding: 10px 8px;
  background: var(--white);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  text-align: center;
  transition: background var(--t);
  color: var(--black);
  border-radius: 0;
}

button.articulo-editar:hover { background: var(--gray-100); }
button.articulo-editar.seleccionado-modal { background: var(--black); color: var(--white); }

.cantidad-modal {
  display: flex;
  gap: 0;
  align-items: center;
  margin: 14px 0;
}

.cantidad-modal label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  margin-right: 12px;
}

.cantidad-modal button {
  padding: 6px 12px;
  background: var(--black);
  color: var(--white);
  border: none;
  cursor: pointer;
  font-size: 14px;
  border-radius: 0;
}

.cantidad-modal button:hover { background: var(--gray-700); }

.cantidad-modal input {
  width: 60px;
  padding: 6px 8px;
  font-size: 13px;
  font-family: var(--font);
  border: none;
  border-top: 1px solid var(--gray-300);
  border-bottom: 1px solid var(--gray-300);
  text-align: center;
  font-weight: 600;
  background: var(--white);
  border-radius: 0;
}

.modal-botones {
  display: flex;
  gap: 4px;
  margin-top: 20px;
  flex-direction: column;
}

button.btn-agregar-modal, button.btn-cancelar-modal, .btn-propina {
  width: 100%;
  padding: 13px;
  border: none;
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background var(--t);
  border-radius: 0;
}

button.btn-agregar-modal { background: var(--black); color: var(--white); }
button.btn-agregar-modal:hover { background: var(--gray-700); box-shadow: none; }
button.btn-cancelar-modal { background: var(--gray-200); color: var(--black); }
button.btn-cancelar-modal:hover { background: var(--gray-300); }
.btn-propina { background: var(--gray-100); color: var(--black); border: 1px solid var(--gray-300); }
.btn-propina:hover { background: var(--gray-200); transform: none; box-shadow: none; }

/* ── VARIANTES ── */
.variante-btn {
  padding: 12px 8px;
  background: var(--white);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  text-align: center;
  transition: background var(--t);
  font-weight: 400;
  color: var(--black);
  border-radius: 0;
}

.variante-btn:hover { background: var(--gray-100); transform: none; box-shadow: none; }
.variante-btn.seleccionada-variante { background: var(--black); color: var(--white); }
.variante-btn.seleccionada-variante small { color: var(--white) !important; }

/* ── ESTADOS PEDIDO (colores funcionales, no decorativos) ── */
.pedido-activo  { border-left-color: var(--danger) !important; }
.pedido-completado { border-left-color: var(--success) !important; }

/* ── INPUT FECHA ── */
input[type="date"] {
  padding: 8px 10px;
  border: 1px solid var(--gray-300);
  border-radius: 0;
  font-family: var(--font);
  font-size: 12px;
  color: var(--black);
  background: var(--white);
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  body { padding: 8px; }
  .header { padding: 20px 12px; }
  .seccion { padding: 16px 0; }
  .categorias { gap: 0; }
  button.categoria { padding: 8px 12px; min-width: 60px; }
  .articulos { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  button.articulo { min-height: 75px; }
  .botones-pedido { flex-direction: column; }
  .pedido-header { flex-direction: column; align-items: flex-start; }
  .modal-content { width: 95%; margin: 10px auto; padding: 18px; }
}

@media (max-width: 400px) {
  .articulos { grid-template-columns: repeat(2, 1fr); }
  button.categoria { font-size: 9px; padding: 6px 8px; }
  .cantidad-control { flex-direction: column; gap: 8px; }
  .articulos-editar { grid-template-columns: repeat(2, 1fr); }
}

.mesa-boton.para-llevar {
  border-color: #b85c00;
  color: #b85c00;
  font-weight: 600;
}
.mesa-boton.para-llevar:hover {
  background: #b85c00;
  color: var(--white);
}
.mesa-boton.para-llevar.seleccionada {
  background: #b85c00;

const NUMERO_DE_MESAS = 10;
const MESAS_PARA_LLEVAR = [11, 12, 13]; // Estas son "Para Llevar"
let mesasOcupadas = [];
let mesaSeleccionada = null;

function cargarEstadoMesas() {
  pedidosRef.on('value', (snapshot) => {
    const pedidos = snapshot.val();
    mesasOcupadas = [];
    
    if (pedidos) {
      Object.values(pedidos).forEach(pedido => {
        // Solo marcar como ocupadas si NO es "Para Llevar"
        if ((pedido.estado === 'pendiente' || pedido.estado === 'preparado') && 
            pedido.mesa && 
            !MESAS_PARA_LLEVAR.includes(parseInt(pedido.mesa))) {
          mesasOcupadas.push(parseInt(pedido.mesa));
        }
      });
    }
    renderizarMesas();
  });
}

function renderizarMesas() {
    const contenedor = document.getElementById('contenedorMesas');
    contenedor.innerHTML = '';
    
    for (let i = 1; i <= NUMERO_DE_MESAS + MESAS_PARA_LLEVAR.length; i++) {
        const ocupada = mesasOcupadas.includes(i);
        const esParaLlevar = MESAS_PARA_LLEVAR.includes(i);
        
        const boton = document.createElement('div');
        boton.className = 'mesa-boton';
        
        // Estilos para "Para Llevar"
       // En renderizarMesas, donde dice "Estilos para Para Llevar":
if (esParaLlevar) {
  boton.classList.add('para-llevar');  // ← clase en vez de inline
  if (mesaSeleccionada === i) boton.classList.add('seleccionada');
} else {
  boton.className = ocupada ? 'mesa-boton ocupada' : 'mesa-boton libre';
  if (mesaSeleccionada === i) boton.classList.add('seleccionada');
}

        // Nombre de la mesa
        let nombreMesa;
        if (i === 10) {
            nombreMesa = '⭐ VIP';
        } else if (esParaLlevar) {
            nombreMesa = '📦 Para Llevar';
        } else {
            nombreMesa = `Mesa ${i}`;
        }
        
        // Icono y estado
        let icono = '🟢';
        let estado = 'Libre';
        
        if (esParaLlevar) {
            icono = '📦';
            estado = 'Llevar';
        } else if (ocupada) {
            icono = '🔴';
            estado = 'Ocupada';
        }
        
        boton.innerHTML = `
            <div style="font-size: 20px; margin-bottom: 5px;">${icono}</div>
            <div>${nombreMesa}</div>
            <div style="font-size: 11px; margin-top: 3px;">${estado}</div>
        `;
        
        // Click solo si no está ocupada (o si es Para Llevar)
        if (!ocupada) {
            boton.onclick = () => seleccionarMesa(i);
        }
        
        contenedor.appendChild(boton);
    }

function formatearTiempo(segundos) {
  if (!segundos) return '-';
  
  const horas = Math.floor(segundos / 3600);
  const minutos = Math.floor((segundos % 3600) / 60);
  const segs = segundos % 60;

  if (horas > 0) {
    return `${horas}h ${minutos}m`;
  } else if (minutos > 0) {
    return `${minutos}m ${segs}s`;
  } else {
    return `${segs}s`;
  }
}

function cargarPedidos() {
    pedidosRef.on('value', (snapshot) => {
        const pedidos = snapshot.val();
        
        if (!pedidos) {
            mostrarPedidos([]);
            return;
        }
        
        // Convertir a array con keys
        let pedidosArray = Object.entries(pedidos).map(([key, pedido]) => ({
            ...pedido,
            key: key
        }));
        
        // Aplicar filtro según la opción seleccionada
        const ahora = new Date();
        
        if (filtroActual === 'hoy') {
            pedidosArray = pedidosArray.filter(pedido => {
                return esMismaFecha(pedido.fechaCompleta, ahora);
            });
        } else if (filtroActual === 'ayer') {
            const ayer = new Date();
            ayer.setDate(ayer.getDate() - 1);
            pedidosArray = pedidosArray.filter(pedido => {
                return esMismaFecha(pedido.fechaCompleta, ayer);
            });
        } else if (filtroActual === 'semana') {
            pedidosArray = pedidosArray.filter(pedido => {
                return estaEnRango(pedido.fechaCompleta, 7);
            });
        } else if (filtroActual === 'personalizada') {
            const fechaSeleccionada = document.getElementById('fechaPersonalizada').value;
            if (fechaSeleccionada) {
                pedidosArray = pedidosArray.filter(pedido => {
                    const fechaPedido = new Date(pedido.fechaCompleta);
                    const fechaBuscada = new Date(fechaSeleccionada);
                    return esMismaFecha(fechaPedido, fechaBuscada);
                });
            }
        }
        // Si es 'todo', no se filtra nada
        
        mostrarPedidos(pedidosArray);
    });
}

  }

  lista.innerHTML = pedidosArray.map(pedido => {
    let estadoTexto, estadoClase, botonTexto, botonColor, mostrarBoton = true;

    if (pedido.estado === 'pendiente') {
      estadoTexto = 'PENDIENTE';
      estadoClase = 'estado-pendiente';
      botonTexto  = 'ENTREGADO';
      botonColor  = '#0275d8';
    } else if (pedido.estado === 'preparado') {

      estadoClase = 'estado-entregado';
      botonTexto  = 'PAGADO';

    } else if (pedido.estado === 'pagado') {

      estadoClase = 'estado-pagado';
      mostrarBoton = false;
    }

    const nombreMesa = [11,12,13].includes(parseInt(pedido.mesa))
      ? 'Para Llevar'

        ? 'VIP'

    return `
      <div class="pedido-item ${estadoClase}">

        <div class="pedido-meta">
          <span class="pedido-mesa">${nombreMesa}</span>
          <span class="pedido-hora">${pedido.fecha} — ${pedido.tiempo}</span>
        </div>

        <div class="pedido-estado-badge ${estadoClase}-badge">${estadoTexto}</div>

        <div class="pedido-items">
          ${pedido.items ? pedido.items.map(i => `${i.nombre} x${i.cantidad}`).join('<br>') : 'N/A'}
        </div>

        ${pedido.tiempoPreparacion ? `
          <div class="pedido-tiempo">
            Tiempo de preparación: ${formatearTiempo(pedido.tiempoPreparacion)}
          </div>` : ''}

        ${pedido.propina && pedido.propina > 0 ? `
          <div class="pedido-propina">
            Propina: ${formatearPrecio(pedido.propina)}
          </div>` : ''}

        <div class="pedido-total">Total: ${formatearPrecio(pedido.total)}</div>

        <div class="pedido-botones">
          <button class="editar" onclick="abrirModalEditar('${pedido.key}')">Editar</button>
          ${mostrarBoton ? `
            <button class="completar"
              style="background:${botonColor}"
              onclick="cambiarEstadoPedido('${pedido.key}', '${pedido.estado}', ${pedido.timestamp})">
              ${botonTexto}
            </button>` : ''}
          <button class="eliminar" onclick="eliminarPedido('${pedido.key}')">Eliminar</button>

      </div>

  }).join('');
}

       function abrirModalEditar(key) {
    pedidosRef.child(key).once('value', (snapshot) => {

        const modal = document.getElementById('modalEditar');

        let html = '<div class="articulos-actuales">';

        html += pedido.items.map((item, idx) => `
            <div class="item-actual">
                <span><strong>${item.nombre}</strong> x${item.cantidad} - ${formatearPrecio(item.subtotal)}</span>
                <button class="quitar" onclick="eliminarDelPedidoEditado(${idx})">Quitar</button>
            </div>
        `).join('');
        html += '</div>';

        html += '<h4 style="color: #8B4513; margin: 15px 0 10px; font-weight: 600;">➕ Agregar artículo:</h4>';

                html += `

}

function seleccionarVarianteEditar(sabor, btn) {

function confirmarVarianteEditar() {
  if (!varianteSeleccionada) {
    alert('Elige un sabor primero');
    return;
  }

  const cantidad = parseInt(document.getElementById('cantidadVariante').value);
  const nombreCompleto = `${articuloVarianteBase.nombre} - ${varianteSeleccionada}`;

  // Agregar al pedido que se está editando en Firebase
  pedidosRef.child(pedidoEditandoId).once('value', snapshot => {
    const pedido = snapshot.val();
    pedido.items.push({
      id: articuloVarianteBase.id,
      nombre: nombreCompleto,
      precio: articuloVarianteBase.precio,
      cantidad,
      subtotal: articuloVarianteBase.precio * cantidad
    });
    pedido.total = pedido.items.reduce((sum, item) => sum + item.subtotal, 0);
    pedidosRef.child(pedidoEditandoId).update(pedido);
  });

  articuloVarianteBase = null;
  varianteSeleccionada = null;
  cerrarModalVariantes();

  // Volver a abrir el modal de editar para ver los cambios
  setTimeout(() => abrirModalEditar(pedidoEditandoId), 300);
}


      function seleccionarArticuloEditar(id, nombre, precio) {
  // Verificar si tiene variantes
  for (let categoria in ARTICULOS) {
    const art = ARTICULOS[categoria].find(a => a.id === id);
    if (art && art.tieneVariantes) {
      // Abrir modal de variantes en modo "editar"
      abrirModalVariantesEditar(id, nombre, precio, art.variantes);
      return;
    }
  }

  // Sin variantes — comportamiento normal
  document.querySelectorAll('.articulo-editar')
    .forEach(btn => btn.classList.remove('seleccionado-modal'));
  document.getElementById(`art-modal-${id}`).classList.add('seleccionado-modal');
  articuloEditandoId = id;
  cantidadEditando = 1;
  document.getElementById('cantidadEditando').value = 1;
}

function agregarAlPedidoEditado() {
    if (!articuloEditandoId) {
        alert('Selecciona un artículo');
        return;
    }

    pedidosRef.child(pedidoEditandoId).once('value', (snapshot) => {
        const pedido = snapshot.val();

        let articuloNombre = '', articuloPrecio = 0;
        for (let categoria in ARTICULOS) {
            const art = ARTICULOS[categoria].find(a => a.id === articuloEditandoId);
            if (art) {
                articuloNombre = art.nombre;
                articuloPrecio = art.precio;
                break;
            }
        }

        const cantidad = parseInt(document.getElementById('cantidadEditando').value);
        pedido.items.push({
            id: articuloEditandoId,
            nombre: articuloNombre,
            precio: articuloPrecio,
            cantidad,
            subtotal: articuloPrecio * cantidad
        });

        pedido.total = pedido.items.reduce((sum, item) => sum + item.subtotal, 0);
        
        pedidosRef.child(pedidoEditandoId).update(pedido);

        articuloEditandoId = null;
        cerrarModal();
    });
}

function eliminarDelPedidoEditado(idx) {
    pedidosRef.child(pedidoEditandoId).once('value', (snapshot) => {
        const pedido = snapshot.val();
        pedido.items.splice(idx, 1);
        pedido.total = pedido.items.reduce((sum, item) => sum + item.subtotal, 0);
        
        pedidosRef.child(pedidoEditandoId).update(pedido);
        abrirModalEditar(pedidoEditandoId);
    });
}

function cambiarEstadoPedido(key, estadoActual, timestamp) {
  console.log('Click - Key:', key, 'Estado:', estadoActual);
  
  let nuevoEstado;
  let actualizacion = {};

  if (estadoActual === 'pendiente') {
    nuevoEstado = 'preparado';
    let tiempoPreparacion = Math.floor((Date.now() - timestamp) / 1000);
    actualizacion = {
      estado: nuevoEstado,
      tiempoPreparacion: tiempoPreparacion  // Solo setea si hay valor
    };
  } else if (estadoActual === 'preparado') {
    nuevoEstado = 'pagado';
    actualizacion = {
      estado: nuevoEstado
      // NO incluyas tiempoPreparacion aquí, déjalo como está
    };
  } else {
    return;
  }

  pedidosRef.child(key).update(actualizacion).then(() => {
    console.log('✅ Actualizado a:', nuevoEstado);
    if (nuevoEstado === 'pagado') {
      liberarMesaPedido(key);
      alert('✅ Mesa liberada!');
    }
    cargarPedidos();
    cargarEstadoMesas();
  }).catch(error => {
    console.error('Error:', error);
    alert('❌ Error: ' + error.message);
  });
}

// Función auxiliar para comparar fechas
function esMismaFecha(fecha1, fecha2) {
    const d1 = new Date(fecha1);
    const d2 = new Date(fecha2);
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth() === d2.getMonth() &&
           d1.getDate() === d2.getDate();
}

// Función auxiliar para verificar si una fecha está en un rango
function estaEnRango(fecha, diasAtras) {
    const ahora = new Date();

function agregarPropina() {

function agregarPropina() {
    if (!pedidoEditandoId) {
        alert('⚠️ Error: No se encontró el pedido');
        return;
    }
    
    const propina = prompt('💰 ¿Cuánto dejó de propina el cliente?\n\nEjemplo: 5000');
    
    if (propina === null) {
        return; // Usuario canceló
    }
    
    const propinaNumero = parseInt(propina.replace(/\D/g, '')); // Elimina todo excepto números
    
    if (isNaN(propinaNumero) || propinaNumero < 0) {
        alert('⚠️ Por favor ingresa un número válido');
        return;
    }
    
    // Actualizar en Firebase
    pedidosRef.child(pedidoEditandoId).once('value').then(snapshot => {
        const pedido = snapshot.val();
        
        if (!pedido) {
            alert('❌ Error: Pedido no encontrado');
            return;
        }
        
        // Calcular nuevo total
        const subtotal = pedido.items.reduce((sum, item) => sum + item.subtotal, 0);
        const nuevoTotal = subtotal + propinaNumero;
        
        // Actualizar en Firebase
        pedidosRef.child(pedidoEditandoId).update({
            propina: propinaNumero,
            total: nuevoTotal
        }).then(() => {
            alert(`✅ Propina de $${propinaNumero.toLocaleString('es-CO')} agregada correctamente`);
            cargarPedidos();
            cerrarModal();
        }).catch(error => {
            alert('❌ Error: ' + error.message);
        });
    });
}
